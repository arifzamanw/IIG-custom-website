{% extends 'base.html' %}
        {% load static %}
    
        {% block content %}

        <div class="page-head"> 
            <video src="{% static 'assets/dubai.mp4' %}" autoplay muted loop style=" position: absolute;
            top: 0; 
            left: 0;
            width: 100%;
            object-fit: cover;z-index:-1"
            >
            <div class="container">
                <div class="row">
                    <div class="page-head-content">
                        <h1 class="page-title">{{info.title}}</h1>               
                    </div>
                </div>
            </div>
        </div>
        <div class="content-area blog-page padding-top-40" style="background-color: #FCFCFC; padding-bottom: 55px;">
            <div class="container">   
                <div class="row">
                    <div class="blog-lst col-md-12 pl0">
                        <section class="post">
                            <h3 class="intro" style='line-height: 50px;text-align: justify;'>
                                {{info.description}}
                            </h3>
                            <br>
                        </section>  
                    </div>  
                </div>
            </div>
        </div>
{% endblock %}
