# ─────────────── investingeorgia.ae (HTTP only for now) ───────────────
server {
    listen 80;
    server_name investingeorgia.ae www.investingeorgia.ae 76.13.180.222;
    client_max_body_size 50M;

    location ~* /\.(env|git|htaccess|gitignore|log|bak|sql|ini|swp)$ {
        deny all;
        return 404;
    }

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://investgeorgia_app:2200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
        proxy_connect_timeout 120;
        proxy_send_timeout 120;
    }
}

# ─────────────── cozyproperties.ae ───────────────
server {
    listen 80;
    server_name cozyproperties.ae www.cozyproperties.ae;
    client_max_body_size 50M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location ~* /\.(env|git|htaccess|gitignore|log|bak|sql|ini|swp)$ {
        deny all;
        return 404;
    }

    location /static/ {
        alias /cozy/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/cozy/ {
        alias /cozy/media/;
        expires 30d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://cozy_app:8010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
        proxy_connect_timeout 120;
        proxy_send_timeout 120;
    }
}
