services:

  # ─────── investingeorgia ───────
  investgeorgia_db:
    image: postgres:17
    container_name: investgeorgia_postgres
    restart: always
    environment:
      POSTGRES_DB: investgeorgia_db
      POSTGRES_USER: investingerogiauser
      POSTGRES_PASSWORD: investingerogiapassword112233..
    volumes:
      - investgeorgia_postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5472:5432"
    networks:
      - app_net

  investgeorgia_app:
    build: ./invest_in_georgia
    container_name: invest_in_georgia
    restart: always
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             gunicorn real_estate.wsgi:application --bind 0.0.0.0:2200"
    volumes:
      - ./invest_in_georgia:/app
      - static_volume:/app/staticfiles
      - ./invest_in_georgia/media:/app/media
    env_file:
      - ./invest_in_georgia/.env
    depends_on:
      - investgeorgia_db
    networks:
      - app_net

  # ─────── cozy ───────
  cozy_db:
    image: postgres:17
    container_name: cozy_postgres
    restart: always
    environment:
      POSTGRES_DB: cozy_db
      POSTGRES_USER: cozy_user
      POSTGRES_PASSWORD: cozy_password
    volumes:
      - cozy_postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5473:5432"
    networks:
      - app_net

  cozy_app:
    build: ./cozyproperties
    container_name: cozy_django
    restart: always
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn cozyproperties.wsgi:application --bind 0.0.0.0:8010"
    volumes:
      - ./cozyproperties:/app
      - cozy_static_volume:/app/staticfiles
      - ./cozyproperties/media:/app/media
    ports:
      - "8011:8010"
    env_file:
      - ./cozyproperties/.env
    depends_on:
      - cozy_db
    networks:
      - app_net

  # ─────── shared nginx ───────
  nginx:
    image: nginx:latest
    container_name: django_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles:ro
      - ./invest_in_georgia/media:/app/media:ro
      - cozy_static_volume:/cozy/staticfiles:ro
      - ./cozyproperties/media:/cozy/media:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - investgeorgia_app
      - cozy_app
    networks:
      - app_net

volumes:
  investgeorgia_postgres_data:
  cozy_postgres_data:
  static_volume:
  cozy_static_volume:

networks:
  app_net:
    driver: bridge
